name: CI

on:
  push:
    branches: [main]
    paths:
      - "ProfilePilot/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "ProfilePilot/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: ProfilePilot

jobs:
  build-test:
    name: Build & test on macOS
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Bootstrap toolchain
        run: |
          chmod +x scripts/*.sh
          brew install xcodegen xcbeautify librsvg create-dmg
          python3 -m pip install --upgrade pip cairosvg Pillow

      - name: Generate app icons
        run: python3 scripts/generate_icons.py

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project ProfilePilot.xcodeproj \
            -scheme ProfilePilot \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project ProfilePilot.xcodeproj \
            -scheme ProfilePilot \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test | xcbeautify

      - name: SwiftLint (soft-fail)
        continue-on-error: true
        run: |
          brew install swiftlint || true
          swiftlint --strict || true
