name: Release

on:
  push:
    tags:
      - "v*"

# The following repository secrets are required:
#   DEVELOPER_ID_APPLICATION       — e.g. "Developer ID Application: Your Name (TEAMID1234)"
#   DEVELOPMENT_TEAM               — 10-char team id
#   APPLE_ID                       — apple id email
#   APPLE_APP_SPECIFIC_PASSWORD    — from appleid.apple.com
#   MAC_CERTIFICATES_P12_BASE64    — base64 of the exported Developer ID .p12
#   MAC_CERTIFICATES_P12_PASSWORD  — password protecting the .p12
#   SPARKLE_ED_PRIVATE_KEY         — Sparkle EdDSA private key (base64)

jobs:
  release:
    name: Build, sign, notarise, publish
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen, create-dmg, xcbeautify
        run: brew install xcodegen create-dmg xcbeautify

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.MAC_CERTIFICATES_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MAC_CERTIFICATES_P12_PASSWORD }}
        run: |
          set -euo pipefail
          echo "$P12_BASE64" | base64 -d > /tmp/dev-id.p12
          security create-keychain -p ci ci.keychain
          security list-keychains -d user -s ci.keychain login.keychain
          security default-keychain -s ci.keychain
          security unlock-keychain -p ci ci.keychain
          security import /tmp/dev-id.p12 -k ci.keychain \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k ci ci.keychain
          rm -f /tmp/dev-id.p12
          security find-identity -p codesigning -v

      - name: Configure notarytool credentials
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: |
          xcrun notarytool store-credentials "ProfilePilotNotary" \
            --apple-id "$APPLE_ID" \
            --team-id "$DEVELOPMENT_TEAM" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build, sign, notarise, package
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          MARKETING_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/release.sh

      - name: Sign Sparkle update ZIP
        if: ${{ secrets.SPARKLE_ED_PRIVATE_KEY != '' }}
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_ED_PRIVATE_KEY" > /tmp/sparkle_priv.key
          # Sparkle's sign_update ships in .build via SwiftPM or the Sparkle app itself.
          # For CI, we vendor it under Sparkle/bin/sign_update. See Sparkle/README.md.
          if [[ -x Sparkle/bin/sign_update ]]; then
            ZIP=$(ls build/ProfilePilot-*.zip | head -n1)
            Sparkle/bin/sign_update -f /tmp/sparkle_priv.key "$ZIP" | tee build/sparkle-signature.txt
          else
            echo "::warning::sign_update not found. Skipping Sparkle signature."
          fi
          rm -f /tmp/sparkle_priv.key

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ProfilePilot ${{ steps.ver.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            build/ProfilePilot-*.dmg
            build/ProfilePilot-*.zip
            build/appcast-entry.xml
            build/sparkle-signature.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
