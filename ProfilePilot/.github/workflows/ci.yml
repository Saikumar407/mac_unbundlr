name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & test on macOS
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Debug)
        run: |
          set -o pipefail
          xcodebuild \
            -project ProfilePilot.xcodeproj \
            -scheme ProfilePilot \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build | xcbeautify

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild \
            -project ProfilePilot.xcodeproj \
            -scheme ProfilePilot \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            test | xcbeautify

      - name: SwiftLint (soft-fail)
        continue-on-error: true
        run: |
          brew install swiftlint || true
          swiftlint --strict || true
